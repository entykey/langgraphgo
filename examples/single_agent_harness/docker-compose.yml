# Single-Agent Harness — Langfuse stack
# =======================================
# Chay: docker compose up -d
#
# Ports:
#   sah-langfuse-web  -> http://localhost:3100   (Langfuse UI + API)
#   sah-postgres      -> localhost:5533          (optional direct access)
#   sah-clickhouse    -> 127.0.0.1:8124          (internal only)
#   sah-minio         -> 127.0.0.1:9093          (console, internal only)

name: single-agent-harness

x-langfuse-env: &langfuse-env
  DATABASE_URL: postgresql://postgres:${SAH_POSTGRES_PASSWORD:-sah_postgres_pw}@sah-postgres:5432/langfuse
  NEXTAUTH_URL: http://localhost:3100
  NEXTAUTH_SECRET: ${SAH_NEXTAUTH_SECRET:-sah-nextauth-secret-change-me-in-prod}
  SALT: ${SAH_LANGFUSE_SALT:-sah-langfuse-salt-32chars-xxxxxx}
  ENCRYPTION_KEY: ${SAH_ENCRYPTION_KEY:-a8153b327abb1e86bc83064860728451e19156a8bb882cfa2d3730f9b5d46be1}
  CLICKHOUSE_URL: http://sah-clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://sah-clickhouse:9000
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: ${SAH_CLICKHOUSE_PASSWORD:-sah_click_pw}
  REDIS_HOST: sah-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${SAH_REDIS_PASSWORD:-sah_redis_pw}
  LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://sah-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${SAH_MINIO_PASSWORD:-sah_minio_pw}
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://sah-minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${SAH_MINIO_PASSWORD:-sah_minio_pw}
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

services:

  sah-langfuse-web:
    container_name: sah-langfuse-web
    image: langfuse/langfuse:3
    depends_on:
      sah-postgres:
        condition: service_healthy
      sah-clickhouse:
        condition: service_healthy
      sah-redis:
        condition: service_healthy
      sah-minio:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      <<: *langfuse-env
      # ── Headless auto-init (Langfuse v3) ─────────────────────────────────────
      # These LANGFUSE_INIT_* vars run once at container startup (idempotent):
      #   • Creates org + project with fixed IDs → same URLs survive stack restarts
      #   • Injects LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY as the project API keys
      #     so the Go agent can POST traces without any browser setup
      #   • Creates the admin user (email/password for UI login at http://localhost:3100)
      # No browser interaction is required — the stack is fully usable after `docker compose up -d`.
      # Model pricing is seeded separately by the Go agent on startup (langfuse.go seedLangfuseModels).
      LANGFUSE_INIT_ORG_ID: sah-org
      LANGFUSE_INIT_ORG_NAME: "Single-Agent Harness"
      LANGFUSE_INIT_PROJECT_ID: sah-project
      LANGFUSE_INIT_PROJECT_NAME: "SAH Agent"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@sah.local}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-Admin@SAH2025}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-SAH Admin}
    restart: unless-stopped

  sah-langfuse-worker:
    container_name: sah-langfuse-worker
    image: langfuse/langfuse-worker:3
    depends_on:
      sah-postgres:
        condition: service_healthy
      sah-clickhouse:
        condition: service_healthy
      sah-redis:
        condition: service_healthy
      sah-minio:
        condition: service_healthy
    environment:
      <<: *langfuse-env
    restart: unless-stopped

  sah-postgres:
    container_name: sah-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SAH_POSTGRES_PASSWORD:-sah_postgres_pw}
      POSTGRES_DB: langfuse
    volumes:
      - sah_postgres:/var/lib/postgresql/data
    ports:
      - "5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sah-clickhouse:
    container_name: sah-clickhouse
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${SAH_CLICKHOUSE_PASSWORD:-sah_click_pw}
      CLICKHOUSE_DB: default
    volumes:
      - sah_clickhouse:/var/lib/clickhouse
      - ./clickhouse-config/single-node.xml:/etc/clickhouse-server/config.d/single-node.xml:ro
    ports:
      - "127.0.0.1:8124:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  sah-redis:
    container_name: sah-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${SAH_REDIS_PASSWORD:-sah_redis_pw}
    volumes:
      - sah_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SAH_REDIS_PASSWORD:-sah_redis_pw}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sah-minio:
    container_name: sah-minio
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${SAH_MINIO_PASSWORD:-sah_minio_pw}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9093:9090"   # Console UI
    volumes:
      - sah_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sah-minio-init:
    container_name: sah-minio-init
    image: minio/mc:latest
    depends_on:
      sah-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://sah-minio:9000 minio ${SAH_MINIO_PASSWORD:-sah_minio_pw};
      mc mb --ignore-existing local/langfuse;
      mc mb --ignore-existing local/sah-artifacts;
      echo 'Buckets ready: langfuse, sah-artifacts';
      "

  # ── Go agent (optional — comment out during active development) ───────────────
  # Uncomment this block to run the agent as a container inside the infra.
  # Build context is the repo root (../../) because go.mod + examples/go.mod
  # both need to be present (examples/go.mod uses `replace ../`).
  #
  # When developing: keep this commented, run `go run .` in the host instead.
  # When testing the full containerised stack: uncomment + docker compose up -d --build
  #
  sah-go-agent-core:
    container_name: sah-go-agent-core
    build:
      context: ../..                              # langgraphgo/ repo root
      dockerfile: examples/single_agent_harness/Dockerfile
    env_file: .env                               # API keys (DEEPSEEK_API_KEY, GOOGLE_API_KEY, …)
    environment:
      LANGFUSE_HOST: http://sah-langfuse-web:3000   # internal Docker network — NOT localhost:3100
      UPLOAD_DIR: /app/tmp/uploads
    ports:
      - "8080:8080"
    depends_on:
      sah-langfuse-web:
        condition: service_started
    volumes:
      - sah_uploads:/app/tmp/uploads
    restart: unless-stopped

volumes:
  sah_postgres:
  sah_clickhouse:
  sah_redis:
  sah_minio:
  sah_uploads:
