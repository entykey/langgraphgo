# mas_agent_handoff — Langfuse observability stack
# ===================================================
# Run: docker compose up -d
#
# Ports:
#   mas-langfuse-web  -> http://localhost:3100   (Langfuse UI + API)
#   mas-postgres      -> localhost:5533          (optional direct access)
#   mas-clickhouse    -> 127.0.0.1:8124          (internal only)
#   mas-minio         -> 127.0.0.1:9093          (console, internal only)
#
# After first boot: create a project at http://localhost:3100,
# copy Public/Secret keys into .env as LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY.

name: mas-lab

x-langfuse-env: &langfuse-env
  DATABASE_URL: postgresql://postgres:${MAS_POSTGRES_PASSWORD:-mas_postgres_pw}@mas-postgres:5432/langfuse
  NEXTAUTH_URL: http://localhost:3100
  NEXTAUTH_SECRET: ${MAS_NEXTAUTH_SECRET:-mas-nextauth-secret-change-me-in-prod}
  SALT: ${MAS_LANGFUSE_SALT:-mas-langfuse-salt-32chars-xxxxx}
  ENCRYPTION_KEY: ${MAS_ENCRYPTION_KEY:-a8153b327abb1e86bc83064860728451e19156a8bb882cfa2d3730f9b5d46be1}
  CLICKHOUSE_URL: http://mas-clickhouse:8123
  CLICKHOUSE_MIGRATION_URL: clickhouse://mas-clickhouse:9000
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: ${MAS_CLICKHOUSE_PASSWORD:-mas_click_pw}
  REDIS_HOST: mas-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${MAS_REDIS_PASSWORD:-mas_redis_pw}
  LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://mas-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MAS_MINIO_PASSWORD:-mas_minio_pw}
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_ENABLED: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://mas-minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MAS_MINIO_PASSWORD:-mas_minio_pw}
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

services:

  mas-langfuse-web:
    container_name: mas-langfuse-web
    image: langfuse/langfuse:3
    depends_on:
      mas-postgres:
        condition: service_healthy
      mas-clickhouse:
        condition: service_healthy
      mas-redis:
        condition: service_healthy
      mas-minio:
        condition: service_healthy
    ports:
      - "3100:3000"
    environment:
      <<: *langfuse-env
      LANGFUSE_INIT_ORG_ID: mas-org
      LANGFUSE_INIT_ORG_NAME: "MAS Lab"
    restart: unless-stopped

  mas-langfuse-worker:
    container_name: mas-langfuse-worker
    image: langfuse/langfuse-worker:3
    depends_on:
      mas-postgres:
        condition: service_healthy
      mas-clickhouse:
        condition: service_healthy
      mas-redis:
        condition: service_healthy
      mas-minio:
        condition: service_healthy
    environment:
      <<: *langfuse-env
    restart: unless-stopped

  mas-postgres:
    container_name: mas-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MAS_POSTGRES_PASSWORD:-mas_postgres_pw}
      POSTGRES_DB: langfuse
    volumes:
      - mas_postgres:/var/lib/postgresql/data
    ports:
      - "5533:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mas-clickhouse:
    container_name: mas-clickhouse
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${MAS_CLICKHOUSE_PASSWORD:-mas_click_pw}
      CLICKHOUSE_DB: default
    volumes:
      - mas_clickhouse:/var/lib/clickhouse
      - ./clickhouse-config/single-node.xml:/etc/clickhouse-server/config.d/single-node.xml:ro
    ports:
      - "127.0.0.1:8124:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  mas-redis:
    container_name: mas-redis
    image: redis:7-alpine
    command: redis-server --requirepass ${MAS_REDIS_PASSWORD:-mas_redis_pw}
    volumes:
      - mas_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${MAS_REDIS_PASSWORD:-mas_redis_pw}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mas-minio:
    container_name: mas-minio
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MAS_MINIO_PASSWORD:-mas_minio_pw}
    ports:
      - "127.0.0.1:9093:9090"
    volumes:
      - mas_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mas-minio-init:
    container_name: mas-minio-init
    image: minio/mc:latest
    depends_on:
      mas-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://mas-minio:9000 minio ${MAS_MINIO_PASSWORD:-mas_minio_pw};
      mc mb --ignore-existing local/langfuse;
      echo 'Bucket langfuse ready.';
      "

volumes:
  mas_postgres:
  mas_clickhouse:
  mas_redis:
  mas_minio:
